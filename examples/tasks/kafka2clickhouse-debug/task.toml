schema_version = "1.1"

[task]
name = "harbor/kafka2clickhouse-debug"
description = "Debug a production issue in Kafka-to-ClickHouse ingestion pipeline"
authors = [
  { name = "0x01f", email = "hhxlovety@gmail.com" }
]
keywords = ["kafka", "clickhouse", "debug", "static-analysis", "production-bug"]

[metadata]
difficulty = "medium"
category = "debugging"
tags = ["kafka", "clickhouse", "batching", "rebalance", "production-issue"]
time_limit = "30 minutes"

[verifier]
# No actual verification - just static analysis
type = "manual"
instructions = "Human reviewer checks if the model identifies the correct fix"

[agent]
# Single attempt - this tests deep analysis, not iteration
timeout_sec = 300.0
max_attempts = 3

[environment]
# No docker needed - static analysis only
build_timeout_sec = 60.0
cpus = 1
memory_mb = 1024
storage_mb = 1024
gpus = 0
allow_internet = false
mcp_servers = []

[verifier.env]
[environment.env]
[solution.env]
