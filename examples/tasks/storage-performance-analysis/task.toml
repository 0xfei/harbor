schema_version = "1.1"

[task]
name = "harbor/storage-performance-analysis"
description = "Analyze a week of storage monitoring data to diagnose recurring query latency incidents and identify the systemic root cause"
authors = [
  { name = "0x01f", email = "hhxlovety@gmail.com" }
]
keywords = ["performance", "storage", "incident-analysis", "capacity", "root-cause"]

[metadata]
difficulty = "hard"
category = "performance-analysis"
tags = ["storage", "distributed-systems", "capacity", "monitoring", "incident"]
time_limit = "30 minutes"

[verifier]
type = "manual"
instructions = """
Human reviewer checks:
1. Model correctly identifies that daily 80-90% metadata pressure is the root cause (not Cluster B scan spike, not disk faults)
2. Model refutes the Cluster B hypothesis with data: scan spike days where cluster_a was NOT impacted, or vice versa
3. Model notes metadata pressure paradox: drops during incidents (IO stall) while being the root cause of fragility
4. Model notes that throughput at 14-16:00 reaches 50-56 GB/s without incidents (metadata pressure still high), proving throughput alone is not the trigger
5. Model recommends workload splitting / capacity expansion, NOT just improving monitoring or disk handling
6. Model does NOT recommend blocking Cluster B as the primary fix
"""

[agent]
timeout_sec = 300.0
max_attempts = 3

[environment]
build_timeout_sec = 60.0
cpus = 1
memory_mb = 1024
storage_mb = 2048
gpus = 0
allow_internet = false
mcp_servers = []

[verifier.env]
[environment.env]
[solution.env]
